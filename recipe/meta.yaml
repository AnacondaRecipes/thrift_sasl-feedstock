{% set name = "thrift_sasl" %}
{% set version = "0.4.2" %}
{% set hashtype = "sha256" %}
{% set hash = "6a1c54731cb3ce61bdc041d9dc36e21f0f56db0163bb7b57be84de3fda70922f" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  {{ hashtype }}: {{ hash }}

build:
  number: 3
  script: pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  skip: True  # [linux and s390x]

requirements:
  host:
    - python
    - setuptools

  run:
    - python
    - thrift >=0.10  # [not py2k]
    - thrift  # [py2k]
    - pure-sasl >=0.3.0  # [win]
    - sasl >=0.2.1  # [not win]

test:
  imports:
    - thrift_sasl

about:
  home: https://github.com/cloudera/thrift_sasl
  license: Apache 2.0
  summary: Thrift SASL module that implements TSaslClientTransport
  license_family: Apache
  dev_url: https://github.com/cloudera/thrift_sasl
  doc_url: https://github.com/cloudera/thrift_sasl
  # https://github.com/cloudera/thrift_sasl/pull/7
  # license_file: LICENSE

extra:
  recipe-maintainers:
    - mariusvniekerk
    - ericdill
    - wesm
