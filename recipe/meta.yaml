{% set name = "thrift_sasl" %}
{% set version = "0.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/thrift_sasl-{{ version }}.tar.gz
  sha256: 5bdd5b760d90a13d9b3abfce873db0425861aa8d6bf25912d3cc0467a4f773da

build:
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  number: 0
  skip: True  # [linux and s390x]

requirements:
  host:
    - python
    - setuptools
    - pip
    - wheel
  run:
    - python
    - thrift >=0.10.0  # [py>=30]
    - pure-sasl >=0.6.2
    - six >=1.13.0

test:
  imports:
    - thrift_sasl
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/cloudera/thrift_sasl
  summary: Thrift SASL module that implements TSaslClientTransport
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/cloudera/thrift_sasl
  doc_url: https://github.com/cloudera/thrift_sasl

extra:
  recipe-maintainers:
    - mariusvniekerk
    - ericdill
    - wesm
